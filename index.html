<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>월드투어 프로팀 드래프트</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            font-weight: 900;
            color: #facc15; /* 뚜르 드 프랑스 옐로 */
            margin-bottom: 10px;
            text-align: center;
        }

        p.subtitle {
            color: #a1a1aa;
            margin-bottom: 40px;
        }

        .draft-btn {
            background-color: #facc15;
            color: #111;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 15px 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(250, 204, 21, 0.3);
            margin-bottom: 50px;
        }

        .draft-btn:hover {
            transform: translateY(-2px);
            background-color: #eab308;
            box-shadow: 0 6px 20px rgba(250, 204, 21, 0.5);
        }

        .draft-btn:active {
            transform: translateY(1px);
        }

        .team-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 1000px;
        }

        .card {
            background-color: #1e1e1e;
            border: 2px solid #333;
            border-radius: 12px;
            width: 280px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateY(30px);
        }

        /* 뽑기 애니메이션 클래스 */
        .card.revealed {
            opacity: 1;
            transform: translateY(0);
            border-color: #444;
        }

        .role-badge {
            background-color: #333;
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        /* 포지션별 테마 색상 */
        .role-gc { border-color: #facc15; color: #facc15; background-color: rgba(250, 204, 21, 0.1); }
        .role-domestique { border-color: #3b82f6; color: #3b82f6; background-color: rgba(59, 130, 246, 0.1); }
        .role-sprinter { border-color: #22c55e; color: #22c55e; background-color: rgba(34, 197, 94, 0.1); }

        .rider-name {
            font-size: 1.5rem;
            font-weight: 900;
            text-align: center;
            margin: 0 0 5px 0;
            min-height: 2.4rem;
        }

        .team-name {
            font-size: 0.9rem;
            color: #a1a1aa;
            margin-bottom: 20px;
            text-align: center;
        }

        .season-badge {
            display: inline-block;
            background-color: #ef4444;
            color: white;
            font-size: 0.8rem;
            padding: 2px 8px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .stats {
            width: 100%;
            background-color: #111;
            border-radius: 8px;
            padding: 15px;
            box-sizing: border-box;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .stat-row:last-child {
            margin-bottom: 0;
        }

        .stat-label {
            color: #a1a1aa;
        }

        .stat-value {
            color: #facc15;
            letter-spacing: 2px;
        }

        /* 빈 슬롯 상태 표시 */
        .empty-state .rider-name, 
        .empty-state .team-name, 
        .empty-state .season-badge, 
        .empty-state .stats {
            visibility: hidden;
        }
        .empty-state .card-placeholder {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: #555;
            font-size: 3rem;
            font-weight: 900;
        }
    </style>
</head>
<body>

    <h1>나만의 월드투어 프로팀 구성</h1>
    <p class="subtitle">전설적인 라이더들을 뽑아 최강의 조합을 만드세요</p>

    <button class="draft-btn" onclick="draftTeam()">팀 뽑기 (DRAFT!)</button>

    <div class="team-container">
        <div class="card empty-state revealed" id="slot-gc">
            <div class="card-placeholder">?</div>
            <div class="role-badge role-gc">GC LEADER</div>
            <div class="season-badge" id="gc-season"></div>
            <h2 class="rider-name" id="gc-name"></h2>
            <div class="team-name" id="gc-team"></div>
            <div class="stats">
                <div class="stat-row"><span class="stat-label">GC</span><span class="stat-value" id="gc-stat-gc"></span></div>
                <div class="stat-row"><span class="stat-label">도메스티크</span><span class="stat-value" id="gc-stat-dom"></span></div>
                <div class="stat-row"><span class="stat-label">스프린트</span><span class="stat-value" id="gc-stat-spr"></span></div>
            </div>
        </div>

        <div class="card empty-state revealed" id="slot-dom">
            <div class="card-placeholder">?</div>
            <div class="role-badge role-domestique">DOMESTIQUE</div>
            <div class="season-badge" id="dom-season"></div>
            <h2 class="rider-name" id="dom-name"></h2>
            <div class="team-name" id="dom-team"></div>
            <div class="stats">
                <div class="stat-row"><span class="stat-label">GC</span><span class="stat-value" id="dom-stat-gc"></span></div>
                <div class="stat-row"><span class="stat-label">도메스티크</span><span class="stat-value" id="dom-stat-dom"></span></div>
                <div class="stat-row"><span class="stat-label">스프린트</span><span class="stat-value" id="dom-stat-spr"></span></div>
            </div>
        </div>

        <div class="card empty-state revealed" id="slot-spr">
            <div class="card-placeholder">?</div>
            <div class="role-badge role-sprinter">SPRINTER</div>
            <div class="season-badge" id="spr-season"></div>
            <h2 class="rider-name" id="spr-name"></h2>
            <div class="team-name" id="spr-team"></div>
            <div class="stats">
                <div class="stat-row"><span class="stat-label">GC</span><span class="stat-value" id="spr-stat-gc"></span></div>
                <div class="stat-row"><span class="stat-label">도메스티크</span><span class="stat-value" id="spr-stat-dom"></span></div>
                <div class="stat-row"><span class="stat-label">스프린트</span><span class="stat-value" id="spr-stat-spr"></span></div>
            </div>
        </div>
    </div>

    <script>
        // 여기에 앞서 제공해드린 200명 배열 데이터를 통째로 넣어주시면 됩니다.
        // (현재는 테스트를 위해 일부만 포함되어 있습니다)
        const riders = [
            { name: "Tadej Pogačar", team: "UAE Team Emirates", primeSeason: 2024, gc: "★★★★★", domestique: "★☆☆☆☆", sprint: "★★★★☆" },
            { name: "Jonas Vingegaard", team: "Jumbo-Visma", primeSeason: 2023, gc: "★★★★★", domestique: "★★☆☆☆", sprint: "★★☆☆☆" },
            { name: "Wout van Aert", team: "Jumbo-Visma", primeSeason: 2022, gc: "★★★☆☆", domestique: "★★★★★", sprint: "★★★★★" },
            { name: "Mark Cavendish", team: "Deceuninck-Quick-Step", primeSeason: 2021, gc: "★☆☆☆☆", domestique: "★☆☆☆☆", sprint: "★★★★★" },
            { name: "Sepp Kuss", team: "Jumbo-Visma", primeSeason: 2023, gc: "★★★★☆", domestique: "★★★★★", sprint: "★☆☆☆☆" },
            { name: "Mathieu van der Poel", team: "Alpecin-Fenix", primeSeason: 2021, gc: "★★☆☆☆", domestique: "★★★★☆", sprint: "★★★★★" }
            // ... 전체 데이터 추가
        ];

        function draftTeam() {
            // 버튼 연속 클릭 방지 및 카드 초기화
            const cards = [document.getElementById('slot-gc'), document.getElementById('slot-dom'), document.getElementById('slot-spr')];
            
            cards.forEach(card => {
                card.classList.remove('revealed');
            });

            setTimeout(() => {
                // 배열에서 중복 없이 무작위로 3명 뽑기
                let shuffled = [...riders].sort(() => 0.5 - Math.random());
                let selectedRiders = shuffled.slice(0, 3);

                // UI 업데이트
                updateCard('gc', selectedRiders[0]);
                updateCard('dom', selectedRiders[1]);
                updateCard('spr', selectedRiders[2]);

                // 순차적으로 카드가 나타나는 애니메이션
                cards.forEach((card, index) => {
                    setTimeout(() => {
                        card.classList.remove('empty-state');
                        card.classList.add('revealed');
                    }, index * 300); // 0.3초 간격으로 카드 등장
                });
            }, 400); // 카드가 내려가는 애니메이션 시간 대기
        }

        function updateCard(slotPrefix, rider) {
            document.getElementById(`${slotPrefix}-name`).innerText = rider.name;
            document.getElementById(`${slotPrefix}-team`).innerText = rider.team;
            document.getElementById(`${slotPrefix}-season`).innerText = `${rider.primeSeason} Season`;
            
            document.getElementById(`${slotPrefix}-stat-gc`).innerText = rider.gc;
            document.getElementById(`${slotPrefix}-stat-dom`).innerText = rider.domestique;
            document.getElementById(`${slotPrefix}-stat-spr`).innerText = rider.sprint;
        }
    </script>
</body>
</html>
