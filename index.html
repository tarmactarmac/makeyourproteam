<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>월드투어 프로팀 드래프트</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            font-weight: 900;
            color: #facc15; /* 뚜르 드 프랑스 옐로 */
            margin-bottom: 10px;
            text-align: center;
        }

        p.subtitle {
            color: #a1a1aa;
            margin-bottom: 40px;
        }

        .draft-btn {
            background-color: #facc15;
            color: #111;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 15px 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(250, 204, 21, 0.3);
            margin-bottom: 50px;
        }

        .draft-btn:hover {
            transform: translateY(-2px);
            background-color: #eab308;
            box-shadow: 0 6px 20px rgba(250, 204, 21, 0.5);
        }

        .draft-btn:active {
            transform: translateY(1px);
        }

        .team-container {
            display: flex;
            gap: 20px;
            flex-wrap: nowrap; /* 핵심! wrap을 nowrap으로 변경 */
            justify-content: center;
            width: 100%;
            max-width: 1200px; /* 카드가 다 들어가도록 공간을 1000px -> 1200px로 넓힘 */
            overflow-x: auto; /* 혹시 스마트폰처럼 화면이 좁으면 가로 스크롤이 생기도록 처리 */
            padding-bottom: 10px; /* 스크롤바가 생길 때를 대비한 여백 */
        }
        .card {
            flex: 0 0 auto; /* 추가: 창이 좁아져도 카드 크기가 쪼그라들지 않게 고정 */
            
            background-color: #1e1e1e;
            border: 2px solid #333;
            border-radius: 12px;
            width: 280px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateY(30px);
        }

        /* 뽑기 애니메이션 클래스 */
        .card.revealed {
            opacity: 1;
            transform: translateY(0);
            border-color: #444;
        }

        .role-badge {
            background-color: #333;
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        /* 포지션별 테마 색상 */
        .role-gc { border-color: #facc15; color: #facc15; background-color: rgba(250, 204, 21, 0.1); }
        .role-domestique { border-color: #3b82f6; color: #3b82f6; background-color: rgba(59, 130, 246, 0.1); }
        .role-sprinter { border-color: #22c55e; color: #22c55e; background-color: rgba(34, 197, 94, 0.1); }

        .rider-name {
            font-size: 1.5rem;
            font-weight: 900;
            text-align: center;
            margin: 0 0 5px 0;
            min-height: 2.4rem;
        }

        .team-name {
            font-size: 0.9rem;
            color: #a1a1aa;
            margin-bottom: 20px;
            text-align: center;
        }

        .season-badge {
            display: inline-block;
            background-color: #ef4444;
            color: white;
            font-size: 0.8rem;
            padding: 2px 8px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .stats {
            width: 100%;
            background-color: #111;
            border-radius: 8px;
            padding: 15px;
            box-sizing: border-box;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .stat-row:last-child {
            margin-bottom: 0;
        }

        .stat-label {
            color: #a1a1aa;
        }

        .stat-value {
            color: #facc15;
            letter-spacing: 2px;
        }

        /* 빈 슬롯 상태 표시 */
        .empty-state .rider-name, 
        .empty-state .team-name, 
        .empty-state .season-badge, 
        .empty-state .stats {
            visibility: hidden;
        }
        .empty-state .card-placeholder {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: #555;
            font-size: 3rem;
            font-weight: 900;
        }
        .achievement-text {
            font-size: 0.85rem;
            color: #38bdf8; /* 눈에 띄는 스카이블루 색상 */
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.4;
            word-break: keep-all; /* 단어 단위로 줄바꿈되도록 설정 */
            min-height: 2.4rem; /* 텍스트가 짧아도 카드 높이가 유지되도록 고정 */
        }
    </style>
</head>

        function draftTeam() {
            // 버튼 연속 클릭 방지 및 카드 초기화
            const cards = [document.getElementById('slot-gc'), document.getElementById('slot-dom'), document.getElementById('slot-spr')];
            
            cards.forEach(card => {
                card.classList.remove('revealed');
            });

            setTimeout(() => {
                // 배열에서 중복 없이 무작위로 3명 뽑기
                let shuffled = [...riders].sort(() => 0.5 - Math.random());
                let selectedRiders = shuffled.slice(0, 3);

                // UI 업데이트
                updateCard('gc', selectedRiders[0]);
                updateCard('dom', selectedRiders[1]);
                updateCard('spr', selectedRiders[2]);

                // 순차적으로 카드가 나타나는 애니메이션
                cards.forEach((card, index) => {
                    setTimeout(() => {
                        card.classList.remove('empty-state');
                        card.classList.add('revealed');
                    }, index * 300); // 0.3초 간격으로 카드 등장
                });
            }, 400); // 카드가 내려가는 애니메이션 시간 대기
        }

        function updateCard(slotPrefix, rider) {
            document.getElementById(`${slotPrefix}-name`).innerText = rider.name;
            document.getElementById(`${slotPrefix}-team`).innerText = rider.team;
            document.getElementById(`${slotPrefix}-season`).innerText = `${rider.primeSeason} Season`;
            // ▼ 이 줄을 새로 추가합니다 ▼
            document.getElementById(`${slotPrefix}-achieve`).innerText = rider.achievement;
            document.getElementById(`${slotPrefix}-stat-gc`).innerText = rider.gc;
            document.getElementById(`${slotPrefix}-stat-dom`).innerText = rider.domestique;
            document.getElementById(`${slotPrefix}-stat-spr`).innerText = rider.sprint;
        }
    </script>
